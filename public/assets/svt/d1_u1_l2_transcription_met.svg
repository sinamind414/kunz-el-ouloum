<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 650" width="800" height="650">
  <defs>
    <style>
      text { font-family: 'Noto Kufi Arabic', sans-serif; }
      .title { font-size: 22px; font-weight: bold; fill: #1A2A3A; }
      .label-ar { font-size: 15px; font-weight: bold; fill: #1A2A3A; }
      .label-fr { font-size: 12px; fill: #7F8C8D; }
      .label-small { font-size: 12px; fill: #7F8C8D; }
      .label-white { font-size: 13px; font-weight: bold; fill: #FFFFFF; }
    </style>
    <linearGradient id="noyau" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="membrane" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
    <linearGradient id="adn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A237E"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
    <linearGradient id="arnm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E74C3C"/>
      <stop offset="100%" stop-color="#C62828"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="800" height="650" fill="#FFFFFF"/>

  <!-- Titre -->
  <text x="400" y="40" text-anchor="middle" class="title">الاستنساخ — Transcription (ADN → ARNm)</text>
  <text x="400" y="62" text-anchor="middle" class="label-fr">إنتاج ARNm انطلاقاً من ADN في النواة</text>

  <!-- NUCLEUS -->
  <g transform="translate(400, 320)" filter="url(#shadow)">
    <!-- Membrane nucléaire -->
    <ellipse cx="0" cy="0" rx="250" ry="180" fill="url(#noyau)" stroke="#388E3C" stroke-width="3" stroke-dasharray="8,4"/>
    
    <!-- Pores nucléaires -->
    <ellipse cx="0" cy="175" rx="30" ry="10" fill="#FFF" stroke="#388E3C" stroke-width="2"/>
    <ellipse cx="-80" cy="172" rx="25" ry="8" fill="#FFF" stroke="#388E3C" stroke-width="2"/>
    <ellipse cx="100" cy="173" rx="20" ry="7" fill="#FFF" stroke="#388E3C" stroke-width="2"/>

    <!-- Label Noyau -->
    <text x="0" cy="-170" y="-185" text-anchor="middle" class="label-ar">النواة (Noyau)</text>

    <!-- ADN double brin (partiellement déroulé) -->
    <!-- Partie enroulée -->
    <path d="M -80,-120 C -60,-130 -40,-130 -20,-120 C 0,-110 20,-110 40,-120 C 60,-130 80,-130 100,-120" 
          fill="none" stroke="url(#adn)" stroke-width="5" stroke-linecap="round"/>
    <path d="M -70,-115 C -50,-125 -30,-125 -10,-115 C 10,-105 30,-105 50,-115 C 70,-125 90,-125 110,-115" 
          fill="none" stroke="#5C6BC0" stroke-width="5" stroke-linecap="round"/>

    <!-- Partie déroulée (ADN ouvert) -->
    <path d="M -80,-120 L -130,-60" fill="none" stroke="url(#adn)" stroke-width="4"/>
    <path d="M -70,-115 L -130,-45" fill="none" stroke="#5C6BC0" stroke-width="4"/>

    <!-- Brin matrice (template strand) 3'→5' -->
    <path d="M -130,-60 L -80,20 L -20,40 L 60,60 L 120,30" fill="none" stroke="#5C6BC0" stroke-width="5" stroke-linecap="round"/>
    <!-- Brin codant partiellement déroulé -->
    <path d="M -130,-45 L -60,10" fill="none" stroke="url(#adn)" stroke-width="4" stroke-linecap="round"/>

    <!-- ARN Polymérase -->
    <ellipse cx="-30" cy="30" rx="35" ry="20" fill="#1565C0" opacity="0.85"/>
    <text x="-30" y="35" text-anchor="middle" class="label-white" font-size="10">ARN</text>
    <text x="-30" y="48" text-anchor="middle" class="label-white" font-size="10">Polymérase</text>

    <!-- ARNm en cours de synthèse -->
    <path d="M -80,20 C -60,25 -40,30 -20,35 L 60,60 L 140,40 L 200,20" 
          fill="none" stroke="url(#arnm)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Nucléotides libres (petites lettres) -->
    <g transform="translate(-140, -20)">
      <rect x="0" y="0" width="16" height="16" rx="3" fill="#E74C3C"/>
      <text x="8" y="12" text-anchor="middle" class="label-white" font-size="9">A</text>
      <rect x="25" y="-10" width="16" height="16" rx="3" fill="#F39C12"/>
      <text x="33" y="2" text-anchor="middle" class="label-white" font-size="9">U</text>
      <rect x="50" y="5" width="16" height="16" rx="3" fill="#F39C12"/>
      <text x="58" y="17" text-anchor="middle" class="label-white" font-size="9">G</text>
      <rect x="75" y="-5" width="16" height="16" rx="3" fill="#E74C3C"/>
      <text x="83" y="7" text-anchor="middle" class="label-white" font-size="9">C</text>
    </g>

    <!-- Direction de lecture -->
    <text x="-140" y="-50" class="label-ar" fill="#5C6BC0" font-size="13">3'</text>
    <text x="120" y="75" class="label-ar" fill="#5C6BC0" font-size="13">5'</text>
    <text x="-140" y="50" class="label-ar" fill="#E74C3C" font-size="13">5'</text>
    <text x="210" y="25" class="label-ar" fill="#E74C3C" font-size="13">3'</text>

    <!-- Flèche direction -->
    <path d="M -100,45 L 100,60" fill="none" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>

  <!-- ARNm sortant de la noyau -->
  <path d="M 500,480 C 530,490 560,510 580,540 C 590,555 595,565 600,570" 
        fill="none" stroke="url(#arnm)" stroke-width="6" stroke-linecap="round"/>
  <text x="610" y="550" class="label-ar" fill="#E74C3C">ARNm →</text>
  <text x="650" y="570" class="label-small">(vers le ribosome)</text>

  <!-- Flèche sortie nucléaire -->
  <path d="M 250,490 L 290,520" fill="none" stroke="#E74C3C" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Étapes -->
  <g transform="translate(30, 530)">
    <text x="0" y="0" class="label-ar">① البدء: ارتباط ARN بوليميراز بالمحرّض (Promoteur)</text>
    <text x="0" y="22" class="label-ar">② الاستطالة: القراءة 3'→5' والتركيب 5'→3'</text>
    <text x="0" y="44" class="label-ar">③ الإنهاء: الوصول لتسلسل الإيقاف ← انفصال ARNm</text>
  </g>

  <!-- Pied -->
  <text x="400" y="635" text-anchor="middle" class="label-small">كنز العلوم — SVT بكالوريا 3AS</text>
</svg>
