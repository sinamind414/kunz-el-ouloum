<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 650" width="800" height="650">
<defs><style>text{font-family:'Noto Kufi Arabic',sans-serif;}.t{font-size:20px;font-weight:bold;fill:#1A2A3A;}.la{font-size:13px;font-weight:bold;fill:#1A2A3A;}.ls{font-size:11px;fill:#7F8C8D;}.lw{font-size:10px;font-weight:bold;fill:#FFF;}</style>
<linearGradient id="mito"><stop offset="0%" stop-color="#FCE4EC"/><stop offset="100%" stop-color="#F8BBD0"/></linearGradient></defs>
<rect width="800" height="650" fill="#FFF"/>
<text x="400" y="30" text-anchor="middle" class="t">التنفس الخلوي — Respiration cellulaire</text>
<text x="400" y="50" text-anchor="middle" class="ls">تحويل الطاقة الكيميائية (جلوكوز) → ATP</text>

<!-- Mitochondrion -->
<g transform="translate(400, 310)">
  <ellipse cx="0" cy="0" rx="200" ry="140" fill="url(#mito)" stroke="#C62828" stroke-width="3"/>
  <ellipse cx="0" cy="0" rx="200" ry="140" fill="none" stroke="#C62828" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="0" y="-150" text-anchor="middle" class="la" fill="#C62828">الميتوكندري (Mitochondrie)</text>
  <!-- Inner membrane folds -->
  <path d="M -120,-30 Q -80,-80 -40,-30 Q 0,20 40,-30 Q 80,-80 120,-30" fill="none" stroke="#E91E63" stroke-width="3"/>
  <path d="M -100,30 Q -60,-20 -20,30 Q 20,80 60,30 Q 100,-20 120,10" fill="none" stroke="#E91E63" stroke-width="3"/>
  <text x="-140" y="-60" class="la" font-size="10" fill="#E91E63">الغشاء الداخلي</text>
  <text x="-140" y="-47" class="ls" font-size="9" fill="#E91E63">(Membrane interne)</text>
  <text x="140" y="80" class="la" font-size="10" fill="#C62828">المطرس</text>
  <text x="140" y="93" class="ls" font-size="9" fill="#C62828">(Matrice)</text>
  <text x="140" y="108" class="ls" font-size="9">Krebs cycle</text>
  <!-- ATP Synthase -->
  <circle cx="-80" cy="-20" r="12" fill="#FFD700" stroke="#F57F17" stroke-width="1.5"/>
  <text x="-80" y="-16" text-anchor="middle" class="lw" fill="#1A2A3A" font-size="7">ATP</text>
  <text x="-55" y="-15" class="ls" font-size="8" fill="#F57F17">Synthase</text>
</g>

<!-- Stages -->
<g transform="translate(30, 480)">
  <rect x="0" y="0" width="240" height="80" rx="10" fill="#FFE0B2" stroke="#E65100" stroke-width="1.5"/>
  <text x="120" y="20" text-anchor="middle" class="la" font-size="11" fill="#E65100">① التحلل السكري</text>
  <text x="120" y="38" text-anchor="middle" class="ls" font-size="9">Glucose → 2 Pyruvate</text>
  <text x="120" y="54" text-anchor="middle" class="ls" font-size="9">2 ATP + 2 NADH</text>
  <text x="120" y="70" text-anchor="middle" class="ls" font-size="9">📍 الهيولى (Cytosol)</text>
</g>
<g transform="translate(280, 480)">
  <rect x="0" y="0" width="240" height="80" rx="10" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="120" y="20" text-anchor="middle" class="la" font-size="11" fill="#2E7D32">② دورة كريبس</text>
  <text x="120" y="38" text-anchor="middle" class="ls" font-size="9">Pyruvate → CO₂</text>
  <text x="120" y="54" text-anchor="middle" class="ls" font-size="9">2 ATP + 6 NADH + 2 FADH₂</text>
  <text x="120" y="70" text-anchor="middle" class="ls" font-size="9">📍 مطرس الميتوكندري</text>
</g>
<g transform="translate(530, 480)">
  <rect x="0" y="0" width="240" height="80" rx="10" fill="#BBDEFB" stroke="#1565C0" stroke-width="1.5"/>
  <text x="120" y="20" text-anchor="middle" class="la" font-size="11" fill="#1565C0">③ سلسلة التنفس</text>
  <text x="120" y="38" text-anchor="middle" class="ls" font-size="9">NADH/FADH₂ → ATP</text>
  <text x="120" y="54" text-anchor="middle" class="ls" font-size="9">~34 ATP</text>
  <text x="120" y="70" text-anchor="middle" class="ls" font-size="9">📍 الغشاء الداخلي</text>
</g>

<!-- Equation -->
<g transform="translate(400, 590)">
  <rect x="-320" y="-25" width="640" height="50" rx="10" fill="#FCE4EC" stroke="#C62828" stroke-width="1.5"/>
  <text x="0" y="0" text-anchor="middle" style="font-size:15px;font-weight:bold;fill:#1A2A3A;font-family:'Noto Kufi Arabic'">C₆H₁₂O₆ + 6 O₂ → 6 CO₂ + 6 H₂O + 36-38 ATP</text>
  <text x="0" y="18" text-anchor="middle" class="ls">مردود (Rendement) ≈ 40% — الباقي طاقة حرارية</text>
</g>

<text x="400" y="640" text-anchor="middle" class="ls">كنز العلوم — SVT Bac Algérie 3AS</text>
</svg>
