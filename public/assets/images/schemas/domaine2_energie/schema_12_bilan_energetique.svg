<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" width="800" height="550">
<defs><style>text{font-family:'Noto Kufi Arabic','Segoe UI',system-ui,sans-serif;}
.title,.t{font-size:21px;font-weight:800;fill:#0F2A1D;}
.subtitle{font-size:13px;fill:#6B7280;}
.label-ar,.la{font-size:14px;font-weight:700;fill:#1A2A3A;}
.label-fr{font-size:12px;fill:#6B7280;}
.label-small,.ls{font-size:11px;fill:#6B7280;}
.label-white,.lw{font-size:12px;font-weight:700;fill:#FFFFFF;}</style><linearGradient id="kunzBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7FAF8"/>
      <stop offset="100%" stop-color="#EFF4F1"/>
    </linearGradient>
    <filter id="kunzShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#006d37" flood-opacity="0.06"/>
    </filter>
  </defs>
<rect width="800" height="550" fill="url(#kunzBg)"/>
  <rect x="8" y="8" width="784" height="534" rx="20" fill="none" stroke="#E3EAE6" stroke-width="2" filter="url(#kunzShadow)"/>
<text x="400" y="25" text-anchor="middle" class="t">الحصيلة الطاقوية — Bilan Énergétique Global</text>

<!-- Central ATP -->
<g transform="translate(400, 280)">
  <circle cx="0" cy="0" r="60" fill="#FFD700" stroke="#F57F17" stroke-width="3"/>
  <text x="0" y="-10" text-anchor="middle" style="font-size:22px;font-weight:bold;fill:#1A2A3A">ATP</text>
  <text x="0" y="10" text-anchor="middle" class="ls">الطاقة</text>
  <text x="0" y="30" text-anchor="middle" style="font-size:9px;fill:#7F8C8D">للخلية</text>
</g>

<!-- LEFT: Photosynthesis -->
<g transform="translate(-250, -120)">
  <rect x="-100" y="-30" width="200" height="70" rx="10" fill="#E8F5E9" stroke="#2ECC71" stroke-width="2"/>
  <text x="0" y="-5" text-anchor="middle" class="la" fill="#2ECC71">☀️ التركيب الضوئي</text>
  <text x="0" y="12" text-anchor="middle" class="ls">CO₂ + H₂O + Lumière → Glucose + O₂</text>
  <text x="0" y="28" text-anchor="middle" class="ls">يخزن الطاقة في روابط الجلوكوز</text>
</g>

<!-- RIGHT: Respiration -->
<g transform="translate(250, -120)">
  <rect x="-100" y="-30" width="200" height="70" rx="10" fill="#FCE4EC" stroke="#C62828" stroke-width="2"/>
  <text x="0" y="-5" text-anchor="middle" class="la" fill="#C62828">⚡ التنفس الخلوي</text>
  <text x="0" y="12" text-anchor="middle" class="ls">Glucose + O₂ → CO₂ + H₂O + ATP</text>
  <text x="0" y="28" text-anchor="middle" class="ls">يحرر الطاقة من روابط الجلوكوز</text>
</g>

<!-- Arrows -->
<path d="M -40,-20 C -30,-40 -20,-50 -10,-50" fill="none" stroke="#2ECC71" stroke-width="2" marker-end="url(#arrow)"/>
<path d="M 40,-20 C 30,-40 20,-50 10,-50" fill="none" stroke="#C62828" stroke-width="2" marker-end="url(#arrow)"/>

<!-- BOTTOM: Uses -->
<g transform="translate(0, 120)">
  <rect x="-280" y="0" width="560" height="70" rx="10" fill="#F5F5F5" stroke="#7F8C8D" stroke-width="1.5"/>
  <text x="0" y="18" text-anchor="middle" class="la">استخدامات ATP في الخلية</text>
  <text x="-200" y="40" class="ls">💪 تقلص عضلي</text>
  <text x="-70" y="40" class="ls">🔬 نقل نشط (Na⁺/K⁺)</text>
  <text x="80" y="40" class="ls">🧬 تركيب حيوي</text>
  <text x="200" y="40" class="ls">⚡ نبض عصبي</text>
</g>

<!-- Cycle arrows -->
<path d="M -200,20 C -300,50 -300,100 -200,100" fill="none" stroke="#2ECC71" stroke-width="1.5" stroke-dasharray="5,3"/>
<path d="M 200,20 C 300,50 300,100 200,100" fill="none" stroke="#C62828" stroke-width="1.5" stroke-dasharray="5,3"/>

<!-- Bottom cycle -->
<g transform="translate(0, -200)">
  <text x="0" y="10" text-anchor="middle" style="font-size:13px;font-weight:bold;fill:#1A2A3A">دورة الكربون 🌍</text>
  <text x="0" y="28" text-anchor="middle" class="ls" font-size="9">التركيب الضوئي: CO₂ → Glucose</text>
  <text x="0" y="42" text-anchor="middle" class="ls" font-size="9">التنفس: Glucose → CO₂</text>
</g>

<text x="400" y="540" text-anchor="middle" class="ls">كنز العلوم — SVT بكالوريا 3AS</text>
</svg>
