<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
<defs><style>text{font-family:'Noto Kufi Arabic','Segoe UI',system-ui,sans-serif;}
.title,.t{font-size:21px;font-weight:800;fill:#0F2A1D;}
.subtitle{font-size:13px;fill:#6B7280;}
.label-ar,.la{font-size:14px;font-weight:700;fill:#1A2A3A;}
.label-fr{font-size:12px;fill:#6B7280;}
.label-small,.ls{font-size:11px;fill:#6B7280;}
.label-white,.lw{font-size:12px;font-weight:700;fill:#FFFFFF;}</style><linearGradient id="kunzBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7FAF8"/>
      <stop offset="100%" stop-color="#EFF4F1"/>
    </linearGradient>
    <filter id="kunzShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#006d37" flood-opacity="0.06"/>
    </filter>
  </defs>
<rect width="800" height="500" fill="url(#kunzBg)"/>
  <rect x="8" y="8" width="784" height="484" rx="20" fill="none" stroke="#E3EAE6" stroke-width="2" filter="url(#kunzShadow)"/>
<text x="400" y="25" text-anchor="middle" class="t">التصادم القاري — Collision Continentale (Orogenèse)</text>

<g transform="translate(400, 280)">
  <!-- Continental crust A (left) -->
  <path d="M -350,-80 L -200,-80 L -100,-60 L -40,-50 L -10,-40" fill="none" stroke="#8D6E63" stroke-width="8"/>
  <text x="-200" y="-100" text-anchor="middle" class="la" fill="#8D6E63">قارة (غرانيت)</text>

  <!-- Continental crust B (right) -->
  <path d="M 10,-40 L 40,-50 L 100,-60 L 200,-80 L 350,-80" fill="none" stroke="#8D6E63" stroke-width="8"/>
  <text x="200" y="-100" text-anchor="middle" class="la" fill="#8D6E63">قارة (غرانيت)</text>

  <!-- Thickened crust -->
  <path d="M -40,-50 L -20,-80 L 0,-100 L 20,-80 L 40,-50" fill="none" stroke="#5D3A1A" stroke-width="6"/>
  <text x="0" y="-120" text-anchor="middle" class="la" fill="#5D3A1A">◄► تصادم ►◄</text>
  <path d="M -80,-60 L -80,-100" fill="none" stroke="#F57F17" stroke-width="2"/>
  <path d="M 80,-60 L 80,-100" fill="none" stroke="#F57F17" stroke-width="2"/>

  <!-- Folded layers -->
  <path d="M -60,-55 C -40,-70 -20,-40 0,-55 C 20,-70 40,-40 60,-55" fill="none" stroke="#795548" stroke-width="2"/>
  <path d="M -60,-60 C -40,-75 -20,-45 0,-60 C 20,-75 40,-45 60,-60" fill="none" stroke="#795548" stroke-width="2"/>

  <!-- Ophiolite -->
  <rect x="-20" y="-95" width="40" height="20" rx="3" fill="#607D8B" stroke="#333" stroke-width="1"/>
  <text x="0" y="-85" text-anchor="middle" class="lw" font-size="7">أوفيوليت</text>
  <path d="M 0,-75 L 0,-55" fill="none" stroke="#607D8B" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Metamorphism -->
  <path d="M -30,-40 C -20,-35 -10,-30 0,-35 C 10,-40 20,-35 30,-40" fill="none" stroke="#9C27B0" stroke-width="3" opacity="0.7"/>
  <text x="60" y="-40" class="ls" font-size="8" fill="#9C27B0">ميكاشيست</text>

  <!-- Thrust faults -->
  <path d="M -100,-60 L -80,-40 L -60,-55" fill="none" stroke="#333" stroke-width="1.5"/>
  <path d="M 100,-60 L 80,-40 L 60,-55" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="-120" y="-50" class="ls" font-size="8">صدوع عكسية</text>
  <text x="80" y="-30" class="ls" font-size="8">طيات</text>

  <!-- Collision granite -->
  <ellipse cx="0" cy="-30" rx="15" ry="8" fill="#FF6D00" opacity="0.4"/>
  <text x="0" y="-26" text-anchor="middle" class="lw" font-size="7">غرانيت</text>
</g>

<g transform="translate(30, 430)">
  <text x="0" y="0" class="la">شواهد التصادم القاري:</text>
  <text x="0" y="18" class="ls">① طيات (Plis) + صدوع عكسية (Chevauchements)</text>
  <text x="0" y="34" class="ls">② أوفيوليت = بقايا محيط قديم فوق القارة</text>
  <text x="0" y="50" class="ls">③ تحول متوسط → ميكاشيست + غرانيت تصادمي</text>
  <text x="0" y="66" class="ls">④ مثال: الهيمالايا (اصطدام الهند × آسيا) · الألب</text>
</g>

<text x="400" y="490" text-anchor="middle" class="ls">كنز العلوم — SVT بكالوريا 3AS</text>
</svg>
