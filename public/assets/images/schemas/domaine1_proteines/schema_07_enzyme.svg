<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
<defs><style>text{font-family:'Noto Kufi Arabic',sans-serif;}.t{font-size:18px;font-weight:bold;fill:#1A2A3A;}.la{font-size:12px;font-weight:bold;fill:#1A2A3A;}.ls{font-size:10px;fill:#7F8C8D;}.lw{font-size:10px;font-weight:bold;fill:#FFF;}</style></defs>
<rect width="800" height="600" fill="#FFF"/>
<text x="400" y="30" text-anchor="middle" class="t">نموذجا ارتباط الإنزيم بالركيزة — Modèles Enzyme-Substrat</text>

<!-- LEFT: Lock and Key -->
<g transform="translate(15, 50)">
  <rect x="0" y="0" width="375" height="260" rx="12" fill="#FFF" stroke="#3498DB" stroke-width="2"/>
  <text x="187" y="25" text-anchor="middle" class="la" fill="#3498DB">نموذج القفل والمفتاح (Fischer 1894)</text>
  <!-- Enzyme (lock) -->
  <path d="M 50,100 C 30,80 30,50 60,45 C 100,40 120,60 130,80 C 140,60 160,45 170,65 C 180,85 170,110 150,115 C 130,120 120,100 110,95 C 100,110 80,115 60,110 Z" fill="#3498DB" opacity="0.15" stroke="#3498DB" stroke-width="2"/>
  <path d="M 80,75 C 90,65 100,65 110,75 C 110,85 100,85 90,85 Z" fill="#3498DB" opacity="0.3" stroke="#3498DB" stroke-width="1.5"/>
  <text x="90" y="130" text-anchor="middle" class="la" fill="#3498DB" font-size="11">إنزيم (Enzyme)</text>
  <text x="90" y="142" text-anchor="middle" class="ls">موقع فعال (Site actif)</text>
  <text x="90" y="152" text-anchor="middle" class="ls">شكل ثابت جامد</text>

  <!-- Substrate (key) -->
  <path d="M 250,65 L 260,65 L 265,55 L 275,55 L 275,85 L 265,85 L 260,75 L 250,75 Z" fill="#E74C3C" stroke="#C62828" stroke-width="1.5"/>
  <text x="262" y="95" text-anchor="middle" class="la" fill="#E74C3C" font-size="11">ركيزة</text>
  <text x="262" y="107" text-anchor="middle" class="ls">(Substrat)</text>
  <!-- Arrow -->
  <path d="M 130,70 L 240,70" fill="none" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="185" y="62" text-anchor="middle" class="la" font-size="9">+</text>

  <!-- Complex -->
  <g transform="translate(0, 160)">
    <rect x="50" y="0" width="240" height="70" rx="10" fill="#E8F5E9" stroke="#2ECC71" stroke-width="2"/>
    <text x="170" y="15" text-anchor="middle" class="la" fill="#2ECC71">معقد ES (Complexe Enzyme-Substrat)</text>
    <path d="M 70,35 L 80,25 L 120,25 C 130,25 130,45 120,45 L 80,45 Z" fill="#3498DB" opacity="0.2" stroke="#3498DB" stroke-width="1.5"/>
    <path d="M 140,25 L 150,25 L 155,35 L 165,35 L 165,45 L 155,45 L 150,35 L 140,35 Z" fill="#E74C3C" stroke="#C62828" stroke-width="1"/>
    <text x="170" y="58" text-anchor="middle" class="ls">ارتباط تام = تطابق كامل</text>
  </g>
</g>

<!-- RIGHT: Induced Fit -->
<g transform="translate(405, 50)">
  <rect x="0" y="0" width="380" height="260" rx="12" fill="#FFF" stroke="#E67E22" stroke-width="2"/>
  <text x="190" y="25" text-anchor="middle" class="la" fill="#E67E22">نموذج التلاؤم المحفز (Koshland 1958)</text>
  <!-- Enzyme (flexible) -->
  <path d="M 50,100 C 30,80 30,50 60,45 C 100,40 120,60 130,80 C 140,60 160,45 170,65 C 180,85 170,110 150,115 C 130,120 120,100 110,95 C 100,110 80,115 60,110 Z" fill="#E67E22" opacity="0.15" stroke="#E67E22" stroke-width="2"/>
  <path d="M 80,80 C 90,70 100,70 110,80" fill="none" stroke="#E67E22" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="90" y="130" text-anchor="middle" class="la" fill="#E67E22" font-size="11">إنزيم (Enzyme)</text>
  <text x="90" y="142" text-anchor="middle" class="ls">موقع فعال مرن</text>

  <!-- Substrate -->
  <path d="M 250,60 L 260,60 L 270,50 L 280,50 L 280,80 L 270,80 L 260,70 L 250,70 Z" fill="#E74C3C" stroke="#C62828" stroke-width="1.5"/>
  <text x="265" y="90" text-anchor="middle" class="la" fill="#E74C3C" font-size="11">ركيزة</text>
  <path d="M 135,68 L 240,68" fill="none" stroke="#666" stroke-width="2"/>
  <text x="188" y="60" text-anchor="middle" class="la" font-size="9">+</text>

  <!-- Complex: shape changed -->
  <g transform="translate(0, 160)">
    <rect x="50" y="0" width="240" height="70" rx="10" fill="#FFF3E0" stroke="#E67E22" stroke-width="2"/>
    <text x="170" y="15" text-anchor="middle" class="la" fill="#E67E22">الموقع الفعال تغير شكله!</text>
    <path d="M 70,35 C 75,25 85,25 100,30 C 110,35 115,45 110,48 C 100,50 85,45 75,42 Z" fill="#E67E22" opacity="0.2" stroke="#E67E22" stroke-width="1.5"/>
    <path d="M 140,30 L 150,30 L 155,40 L 165,40 L 165,50 L 155,50 L 150,40 L 140,40 Z" fill="#E74C3C" stroke="#C62828" stroke-width="1"/>
    <text x="170" y="58" text-anchor="middle" class="ls">الموقع تكيف مع الركيزة</text>
  </g>
</g>

<!-- Bottom: Reaction -->
<g transform="translate(15, 330)">
  <rect x="0" y="0" width="770" height="120" rx="12" fill="#F5F5F5" stroke="#2ECC71" stroke-width="1.5"/>
  <text x="385" y="22" text-anchor="middle" class="t" font-size="16">المعادلة العامة للتفاعل الإنزيمي</text>
  <text x="385" y="55" text-anchor="middle" style="font-size:28px;font-weight:bold;fill:#1A2A3A;font-family:'Noto Kufi Arabic'">E + S ⇌ [ES] → [EP] → E + P</text>
  <text x="385" y="80" text-anchor="middle" class="ls">الإنزيم لا يستهلك — يحرر في نهاية التفاعل كما كان</text>
  <text x="385" y="100" text-anchor="middle" class="ls">سرعة التفاعل تعتمد على: درجة الحرارة · pH · تركيز الركيزة · تركيز الإنزيم</text>
</g>

<!-- Comparison table -->
<g transform="translate(15, 465)">
  <text x="0" y="15" class="la">مقارنة:</text>
  <rect x="0" y="25" width="90" height="25" fill="#3498DB" opacity="0.1"/><text x="45" y="42" text-anchor="middle" class="la" font-size="9">المعيار</text>
  <rect x="90" y="25" width="230" height="25" fill="#3498DB" opacity="0.05"/><text x="205" y="42" text-anchor="middle" class="la" font-size="9">القفل والمفتاح</text>
  <rect x="320" y="25" width="230" height="25" fill="#E67E22" opacity="0.05"/><text x="435" y="42" text-anchor="middle" class="la" font-size="9">التلاؤم المحفز</text>
  <line x1="0" y1="50" x2="550" y2="50" stroke="#CCC" stroke-width="0.5"/>
  <text x="45" y="68" class="ls" font-size="9">شكل الموقع</text><text x="205" y="68" class="ls" font-size="9">ثابت / جامد</text><text x="435" y="68" class="ls" font-size="9">مرن / متغير</text>
  <text x="45" y="85" class="ls" font-size="9">النوعية</text><text x="205" y="85" class="ls" font-size="9">صارمة جداً</text><text x="435" y="85" class="ls" font-size="9">أكثر مرونة</text>
  <text x="45" y="102" class="ls" font-size="9">العالم</text><text x="205" y="102" class="ls" font-size="9">Fischer (1894)</text><text x="435" y="102" class="ls" font-size="9">Koshland (1958)</text>
</g>

<text x="400" y="590" text-anchor="middle" class="ls">كنز العلوم — SVT Bac Algérie 3AS</text>
</svg>
