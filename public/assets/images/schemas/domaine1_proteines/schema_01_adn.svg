<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <style>
      text { font-family: 'Noto Kufi Arabic', sans-serif; }
      .title { font-size: 22px; font-weight: bold; fill: #1A2A3A; }
      .label-ar { font-size: 16px; font-weight: bold; fill: #1A2A3A; }
      .label-fr { font-size: 13px; fill: #7F8C8D; }
      .label-small { font-size: 12px; fill: #7F8C8D; }
      .label-white { font-size: 14px; font-weight: bold; fill: #FFFFFF; }
    </style>
    <!-- Dégradés -->
    <linearGradient id="strand1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2ECC71"/>
      <stop offset="100%" stop-color="#1A9C4A"/>
    </linearGradient>
    <linearGradient id="strand2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3498DB"/>
      <stop offset="100%" stop-color="#2C3E50"/>
    </linearGradient>
    <linearGradient id="backbone1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#27AE60"/>
      <stop offset="100%" stop-color="#219A52"/>
    </linearGradient>
    <linearGradient id="backbone2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2980B9"/>
      <stop offset="100%" stop-color="#1F6F9F"/>
    </linearGradient>
    <linearGradient id="baseAT" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E74C3C"/>
      <stop offset="100%" stop-color="#C0392B"/>
    </linearGradient>
    <linearGradient id="baseGC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F39C12"/>
      <stop offset="100%" stop-color="#D68910"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Fond -->
  <rect width="800" height="600" fill="#FFFFFF"/>

  <!-- Titre -->
  <text x="400" y="40" text-anchor="middle" class="title">جزيء ADN — Structure de l'ADN</text>
  <text x="400" y="62" text-anchor="middle" class="label-fr">اللولب المزدوج (Double Hélice)</text>

  <!-- Légende -->
  <g transform="translate(30, 85)">
    <rect x="0" y="0" width="740" height="45" rx="8" fill="#F8F9FA" stroke="#E0E0E0" stroke-width="1"/>
    <rect x="20" y="12" width="16" height="16" rx="3" fill="#E74C3C"/>
    <text x="42" y="25" class="label-small">A (أدينين)</text>
    <rect x="120" y="12" width="16" height="16" rx="3" fill="#2980B9"/>
    <text x="142" y="25" class="label-small">T (ثيمين)</text>
    <rect x="220" y="12" width="16" height="16" rx="3" fill="#F39C12"/>
    <text x="242" y="25" class="label-small">G (غوانين)</text>
    <rect x="340" y="12" width="16" height="16" rx="3" fill="#27AE60"/>
    <text x="362" y="25" class="label-small">C (سيتوزين)</text>
    <line x1="440" y1="20" x2="490" y2="20" stroke="#999" stroke-dasharray="3,3" stroke-width="1.5"/>
    <text x="500" y="25" class="label-small">روابط هيدروجينية</text>
    <rect x="620" y="12" width="16" height="16" rx="3" fill="#1A2A3A"/>
    <text x="642" y="25" class="label-small">سكر-فوسفات</text>
  </g>

  <!-- 
    ADN Double Hélice simplifié
    On dessine 2 brins qui s'enroulent en hélice avec des barres de liaison
  -->
  <g transform="translate(400, 340)" filter="url(#shadow)">

    <!-- BRIN 1 (vert) — hélicoïdal sinusoïdal -->
    <!-- Vague sinusoïdale représentant le premier brin -->
    <path d="M -200,-230 
             C -150,-220 -100,-200 -80,-170
             C -60,-140 -40,-110 -20,-80
             C 0,-50 20,-20 40,10
             C 60,40 80,70 100,100
             C 120,130 140,160 160,190
             C 180,220 200,240 220,250"
          fill="none" stroke="url(#backbone1)" stroke-width="8" stroke-linecap="round"/>

    <!-- BRIN 2 (bleu) — hélicoïdal sinusoïdal (déphasé) -->
    <path d="M 200,-230
             C 150,-220 100,-200 80,-170
             C 60,-140 40,-110 20,-80
             C 0,-50 -20,-20 -40,10
             C -60,40 -80,70 -100,100
             C -120,130 -140,160 -160,190
             C -180,220 -200,240 -220,250"
          fill="none" stroke="url(#backbone2)" stroke-width="8" stroke-linecap="round"/>

    <!-- Barres transversales (paires de bases) -->
    <!-- Paire 1 -->
    <line x1="-170" y1="-200" x2="170" y2="-200" stroke="#E74C3C" stroke-width="5" stroke-linecap="round"/>
    <line x1="-170" y1="-200" x2="-80" y2="-200" stroke="#C0392B" stroke-width="5" stroke-linecap="round"/>
    <line x1="-80" y1="-200" x2="80" y2="-200" stroke="#ddd" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="80" y1="-200" x2="170" y2="-200" stroke="#2980B9" stroke-width="5" stroke-linecap="round"/>

    <!-- Paire 2 -->
    <line x1="-140" y1="-150" x2="140" y2="-150" stroke="#F39C12" stroke-width="5" stroke-linecap="round"/>
    <line x1="-140" y1="-150" x2="-60" y2="-150" stroke="#D68910" stroke-width="5" stroke-linecap="round"/>
    <line x1="-60" y1="-150" x2="60" y2="-150" stroke="#ddd" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="60" y1="-150" x2="140" y2="-150" stroke="#27AE60" stroke-width="5" stroke-linecap="round"/>

    <!-- Paire 3 -->
    <line x1="-90" y1="-100" x2="90" y2="-100" stroke="#E74C3C" stroke-width="5" stroke-linecap="round"/>
    <line x1="-90" y1="-100" x2="-40" y2="-100" stroke="#C0392B" stroke-width="5" stroke-linecap="round"/>
    <line x1="-40" y1="-100" x2="40" y2="-100" stroke="#ddd" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="40" y1="-100" x2="90" y2="-100" stroke="#2980B9" stroke-width="5" stroke-linecap="round"/>

    <!-- Paire 4 -->
    <line x1="-40" y1="-50" x2="40" y2="-50" stroke="#F39C12" stroke-width="5" stroke-linecap="round"/>
    <line x1="-40" y1="-50" x2="-15" y2="-50" stroke="#D68910" stroke-width="5" stroke-linecap="round"/>
    <line x1="-15" y1="-50" x2="15" y2="-50" stroke="#ddd" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="15" y1="-50" x2="40" y2="-50" stroke="#27AE60" stroke-width="5" stroke-linecap="round"/>

    <!-- Paire 5 (au centre) -->
    <line x1="0" y1="0" x2="0" y2="0" stroke="#E74C3C" stroke-width="5" stroke-linecap="round"/>

    <!-- Paire 6 -->
    <line x1="40" y1="50" x2="-40" y2="50" stroke="#E74C3C" stroke-width="5" stroke-linecap="round"/>
    <line x1="40" y1="50" x2="15" y2="50" stroke="#C0392B" stroke-width="5" stroke-linecap="round"/>
    <line x1="15" y1="50" x2="-15" y2="50" stroke="#ddd" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="-15" y1="50" x2="-40" y2="50" stroke="#2980B9" stroke-width="5" stroke-linecap="round"/>

    <!-- Paire 7 -->
    <line x1="90" y1="100" x2="-90" y2="100" stroke="#F39C12" stroke-width="5" stroke-linecap="round"/>
    <line x1="90" y1="100" x2="40" y2="100" stroke="#D68910" stroke-width="5" stroke-linecap="round"/>
    <line x1="40" y1="100" x2="-40" y2="100" stroke="#ddd" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="-40" y1="100" x2="-90" y2="100" stroke="#27AE60" stroke-width="5" stroke-linecap="round"/>

    <!-- Paire 8 -->
    <line x1="140" y1="150" x2="-140" y2="150" stroke="#E74C3C" stroke-width="5" stroke-linecap="round"/>
    <line x1="140" y1="150" x2="60" y2="150" stroke="#C0392B" stroke-width="5" stroke-linecap="round"/>
    <line x1="60" y1="150" x2="-60" y2="150" stroke="#ddd" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="-60" y1="150" x2="-140" y2="150" stroke="#2980B9" stroke-width="5" stroke-linecap="round"/>

    <!-- Paire 9 -->
    <line x1="170" y1="200" x2="-170" y2="200" stroke="#F39C12" stroke-width="5" stroke-linecap="round"/>
    <line x1="170" y1="200" x2="80" y2="200" stroke="#D68910" stroke-width="5" stroke-linecap="round"/>
    <line x1="80" y1="200" x2="-80" y2="200" stroke="#ddd" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="-80" y1="200" x2="-170" y2="200" stroke="#27AE60" stroke-width="5" stroke-linecap="round"/>

    <!-- Labels des bases sur les paires centrales -->
    <text x="-55" y="-196" text-anchor="middle" class="label-white" font-size="11">A</text>
    <text x="55" y="-196" text-anchor="middle" class="label-white" font-size="11">T</text>
    <text x="-25" y="-146" text-anchor="middle" class="label-white" font-size="11">G</text>
    <text x="25" y="-146" text-anchor="middle" class="label-white" font-size="11">C</text>
    <text x="20" y="54" text-anchor="middle" class="label-white" font-size="11">A</text>
    <text x="-20" y="54" text-anchor="middle" class="label-white" font-size="11">T</text>
    <text x="60" y="104" text-anchor="middle" class="label-white" font-size="11">G</text>
    <text x="-60" y="104" text-anchor="middle" class="label-white" font-size="11">C</text>

    <!-- Labels 5' et 3' -->
    <text x="-240" y="-210" class="label-ar" fill="#27AE60">5'</text>
    <text x="225" y="-210" class="label-ar" fill="#2980B9">3'</text>
    <text x="-240" y="260" class="label-ar" fill="#27AE60">3'</text>
    <text x="225" y="260" class="label-ar" fill="#2980B9">5'</text>
  </g>

  <!-- Labels explicatifs -->
  <g transform="translate(40, 480)">
    <text x="0" y="0" class="label-ar">السلسلة المعلوماتية: 5' → 3' (بالأخضر)</text>
    <text x="0" y="25" class="label-ar">السلسلة القالبية: 3' → 5' (بالأزرق)</text>
    <text x="0" y="50" class="label-small">A يقترن مع T (رابطتان هيدروجينيتان)</text>
    <text x="0" y="70" class="label-small">G يقترن مع C (ثلاث روابط هيدروجينية)</text>
  </g>

  <!-- Pied de page -->
  <text x="400" y="580" text-anchor="middle" class="label-small">كنز العلوم — SVT بكالوريا 3AS</text>

</svg>
