<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 650" width="800" height="650">
  <defs>
    <style>text{font-family:'Noto Kufi Arabic','Segoe UI',system-ui,sans-serif;}
.title,.t{font-size:21px;font-weight:800;fill:#0F2A1D;}
.subtitle{font-size:13px;fill:#6B7280;}
.label-ar,.la{font-size:14px;font-weight:700;fill:#1A2A3A;}
.label-fr{font-size:12px;fill:#6B7280;}
.label-small,.ls{font-size:11px;fill:#6B7280;}
.label-white,.lw{font-size:12px;font-weight:700;fill:#FFFFFF;}</style>
    <linearGradient id="riboB"><stop offset="0%" stop-color="#1565C0"/><stop offset="100%" stop-color="#0D47A1"/></linearGradient>
    <linearGradient id="riboP"><stop offset="0%" stop-color="#42A5F5"/><stop offset="100%" stop-color="#1E88E5"/></linearGradient>
    <linearGradient id="arnm"><stop offset="0%" stop-color="#E74C3C"/><stop offset="100%" stop-color="#C62828"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
  <linearGradient id="kunzBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7FAF8"/>
      <stop offset="100%" stop-color="#EFF4F1"/>
    </linearGradient>
    <filter id="kunzShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#006d37" flood-opacity="0.06"/>
    </filter>
  </defs>
  <rect width="800" height="650" fill="url(#kunzBg)"/>
  <rect x="8" y="8" width="784" height="634" rx="20" fill="none" stroke="#E3EAE6" stroke-width="2" filter="url(#kunzShadow)"/>
  <text x="400" y="35" text-anchor="middle" class="t">الترجمة — Traduction (ARNm → Protéine)</text>
  <text x="400" y="55" text-anchor="middle" class="lf">مراحل تركيب البروتين على الريبوزوم</text>

  <g transform="translate(400,360)" filter="url(#sh)">
    <!-- ARNm -->
    <path d="M -260,-120 C -200,-130 -100,-135 0,-130 C 100,-125 200,-120 260,-115" fill="none" stroke="url(#arnm)" stroke-width="8" stroke-linecap="round"/>
    <text x="-280" y="-116" class="la" fill="#E74C3C">5'</text>
    <text x="270" y="-116" class="la" fill="#E74C3C">3'</text>

    <!-- RIBOSOME: Large subunit (top) -->
    <path d="M -100,-80 C -100,-130 100,-130 100,-80 C 100,-60 80,-50 0,-50 C -80,-50 -100,-60 -100,-80 Z" fill="url(#riboB)" stroke="#0D47A1" stroke-width="2"/>
    <text x="0" y="-90" text-anchor="middle" class="lw">الوحدة الكبرى</text>

    <!-- RIBOSOME: Small subunit (bottom) -->
    <path d="M -90,-20 L -90,30 C -90,60 90,60 90,30 L 90,-20 Z" fill="url(#riboP)" stroke="#1565C0" stroke-width="2"/>
    <text x="0" y="25" text-anchor="middle" class="lw" font-size="10">الوحدة الصغرى</text>

    <!-- Sites E, P, A -->
    <text x="-60" y="-60" text-anchor="middle" class="lw" font-size="11">E</text>
    <text x="0" y="-60" text-anchor="middle" class="lw" font-size="11">P</text>
    <text x="60" y="-60" text-anchor="middle" class="lw" font-size="11">A</text>

    <!-- tRNA at P site (with growing peptide) -->
    <path d="M -5,-70 L -5,-40 C -15,-35 -25,-25 -20,-15 C -15,-5 -5,-5 0,-10 C 5,-5 15,-5 10,-15 C 5,-25 -5,-35 -5,-40" fill="none" stroke="#2ECC71" stroke-width="3"/>
    <text x="-5" y="-25" text-anchor="middle" class="lw" fill="#2ECC71" font-size="8">ARNt</text>
    <!-- Peptide chain -->
    <circle cx="-5" cy="-45" r="4" fill="#8E44AD"/>
    <circle cx="-3" cy="-52" r="4" fill="#8E44AD"/>
    <circle cx="-6" cy="-59" r="4" fill="#8E44AD"/>
    <circle cx="-2" cy="-66" r="4" fill="#8E44AD"/>
    <path d="M -2,-66 C 10,-80 40,-90 70,-85" fill="none" stroke="#8E44AD" stroke-width="3" stroke-linecap="round"/>

    <!-- tRNA approaching at A site -->
    <path d="M 55,-70 L 55,-40 C 45,-35 35,-25 40,-15 C 45,-5 55,-5 60,-10" fill="none" stroke="#F39C12" stroke-width="3"/>
    <text x="55" y="-25" text-anchor="middle" class="lw" fill="#F39C12" font-size="8">ARNt</text>

    <!-- Free amino acid -->
    <ellipse cx="80" cy="-100" rx="12" ry="8" fill="#E74C3C" opacity="0.3" stroke="#E74C3C" stroke-width="1.5"/>
    <text x="80" y="-96" text-anchor="middle" class="ls" fill="#C0392B" font-size="9">حمض</text>

    <!-- Arrow direction -->
    <path d="M -260,-105 L -200,-105" fill="none" stroke="#999" stroke-width="2" marker-end="url(#arrow)"/>
  </g>

  <!-- Steps -->
  <g transform="translate(40, 560)">
    <text x="0" y="0" class="la">مراحل الترجمة:</text>
    <text x="0" y="22" class="ls">① البدء: ارتباط ARNm + ARNt-Met + الوحدتين</text>
    <text x="0" y="40" class="ls">② الاستطالة: ARNt جديد ← رابطة ببتيدية ← انزلاق</text>
    <text x="0" y="58" class="ls">③ الإنهاء: رامزة إيقاف ← تحرير البروتين</text>
  </g>
  <g transform="translate(440, 560)">
    <text x="0" y="0" class="la">مواقع الريبوزوم:</text>
    <text x="0" y="20" class="ls" fill="#1565C0">● A (Aminoacyl) : استقبال ARNt</text>
    <text x="0" y="36" class="ls" fill="#1565C0">● P (Peptidyl) : حمل السلسلة</text>
    <text x="0" y="52" class="ls" fill="#1565C0">● E (Exit) : خروج ARNt</text>
  </g>
  <text x="400" y="640" text-anchor="middle" class="ls">كنز العلوم — SVT بكالوريا 3AS</text>
</svg>
